<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUMU | Innovation</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#D4A017;
  --gold-light:#F5C842;
  --bg:#07080D;
  --text-main:#FFFFFF;
  --text-muted:#A0A0A0;
  --font-family: 'Nunito Sans', sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family: var(--font-family);}
canvas{position:fixed;inset:0;z-index:0}

.site{
  position:relative;z-index:10;
  width:100%;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:1.5rem;
  background: radial-gradient(circle at center, rgba(7, 8, 13, 0) 0%, rgba(7, 8, 13, 0.8) 100%);
  text-align: center;
}

/* LOGO */
.logo-text{
  font-size:clamp(3.5rem, 18vw, 9rem);
  font-weight: 900;
  line-height:.9;
  display:flex;align-items:baseline;
}
.lu{color:var(--gold);text-shadow:0 0 40px rgba(212,160,23,.3)}
.mu{color:#FFFFFF;text-shadow:0 0 40px rgba(255,255,255,.1)}

/* ACRONYM */
.acronym{display:flex;align-items:center;margin-top:1.5rem;}
.ac-item{display:flex;flex-direction:column;align-items:center;padding:0 clamp(0.4rem, 1.5vw, 1.5rem);}
.ac-letter{font-size:clamp(0.9rem, 1.5vw, 1.4rem);font-weight:900;color:var(--gold-light);}
.ac-word{font-size:clamp(0.5rem, 0.9vw, 0.75rem);font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--text-main);margin-top:.2rem;}
.ac-pipe{width:1px;height:1.5rem;background:linear-gradient(to bottom,transparent,var(--gold) 50%,transparent);}

/* CYCLING MESSAGE */
.msg-wrap{margin-top:2rem;width: 100%;height:clamp(1.5rem, 5vw, 2.5rem);overflow:hidden;position:relative;}
.msg{
  font-size:clamp(1rem, 4vw, 1.8rem);
  font-weight: 800;
  width: 100%;
  background:linear-gradient(90deg, #fff 0%, var(--gold-light) 50%, #fff 100%);
  -webkit-background-clip:text;background-clip:text;
  color:transparent;
  position:absolute;left:0;
  opacity:0;transform:translateY(14px);
  transition:opacity .5s ease,transform .5s ease;
}
.msg.active{opacity:1;transform:translateY(0)}

/* MISSION */
.mission{margin-top:1.2rem;font-size:clamp(0.55rem, 1.2vw, 0.8rem);max-width: 90vw;line-height: 1.6;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.mission b{color:var(--gold-light);font-weight:700}

.divider{width:clamp(40px, 12vw, 120px);height:2px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:1.5rem 0;}

/* NAV */
.nav{display:flex;flex-wrap:wrap;justify-content:center;gap:0.8rem 1.5rem;}
.nav a{font-size:clamp(0.7rem, 1vw, 0.85rem);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-main);text-decoration:none;}

/* POWERED BY - FIXED BACK TO RIGHT CORNER */
.powered {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 100; /* High z-index to stay above everything */
  display: flex;
  align-items: center;
  gap: 0.5rem;
  pointer-events: none;
}
.pw-label {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.pw-brand {
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: 0.05em;
}

.foot{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);font-size:0.55rem;font-weight:600;width: 90%; text-align: center;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.4);}

@media (max-width: 480px) {
  .nav { flex-direction: column; gap: 0.5rem; }
  .ac-word { display: none; }
  .powered { bottom: 0.5rem; right: 0.5rem; scale: 0.8; } /* Scaled down slightly for very small phones */
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="site">
    <div class="logo-text"><span class="lu">LU</span><span class="mu">MU</span></div>
    <div class="acronym">
      <div class="ac-item"><span class="ac-letter">L</span><span class="ac-word">Light</span></div>
      <div class="ac-pipe"></div>
      <div class="ac-item"><span class="ac-letter">U</span><span class="ac-word">Utility</span></div>
      <div class="ac-pipe"></div>
      <div class="ac-item"><span class="ac-letter">M</span><span class="ac-word">Mankind</span></div>
      <div class="ac-pipe"></div>
      <div class="ac-item"><span class="ac-letter">U</span><span class="ac-word">Uplift</span></div>
    </div>

    <div class="msg-wrap" id="mw">
      <div class="msg active">We Power. We Trigger.</div>
      <div class="msg">We Evolve. We Solve.</div>
      <div class="msg">We Engineer. We Elevate.</div>
      <div class="msg">Every Release. A Better Life.</div>
    </div>

    <p class="mission">Powering partners &nbsp;<b>·</b>&nbsp; Engineering life &nbsp;<b>·</b>&nbsp; Every update matters</p>
    <div class="divider"></div>
    <nav class="nav">
      <a href="/pmp">PMP</a>
      <a href="/idcard">ID Card</a>
      <a href="/cyclekit">Cycle Kit</a>
      <a href="/dosemate">DoseMate</a>
      <a href="/contact">Contact</a>
    </nav>
</div>

<p class="foot">Innovation · Purpose · Impact · Progress</p>

<div class="powered">
  <span class="pw-label">Powered by</span>
  <span class="pw-brand"><span class="lu">LU</span><span class="mu">MU</span></span>
</div>

<script>
const cv=document.getElementById('c'),ct=cv.getContext('2d');
let W,H,pts=[],mouse={x:-9999,y:-9999};
const isMobile = window.innerWidth < 768;
const N = isMobile ? 40 : 80; 
const CONN = isMobile ? 100 : 160;

function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});

for(let i=0;i<N;i++)pts.push({
  x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
  vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
  r:Math.random()*1.5+1
});

(function frame(){
  ct.clearRect(0,0,W,H);
  for(let i=0;i<N;i++) {
    for(let j=i+1;j<N;j++) {
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<CONN){
        ct.beginPath();ct.moveTo(pts[i].x,pts[i].y);ct.lineTo(pts[j].x,pts[j].y);
        ct.strokeStyle=`rgba(212, 160, 23, ${(1-d/CONN)*0.6})`; 
        ct.lineWidth=isMobile ? 1 : 2; 
        ct.stroke();
      }
    }
  }
  for(const p of pts){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
    ct.beginPath();ct.arc(p.x,p.y,p.r,0,Math.PI*2);
    ct.fillStyle=`rgba(212, 160, 23, 0.4)`;
    ct.fill();
  }
  requestAnimationFrame(frame);
})();

const msgs=[...document.querySelectorAll('.msg')];
let cur=0;
setInterval(()=>{
  msgs[cur].classList.remove('active');
  cur=(cur+1)%msgs.length;
  msgs[cur].classList.add('active');
},3200);
</script>
</body>
</html>
